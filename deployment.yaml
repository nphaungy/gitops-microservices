apiBVersion: apps/v1
kind: Deployment
metadata:
  name: my-microservice-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web -nginx
    template:
      metadata:
        labels:
          app: web  -nginx
      spec:
        containers:
        - name: nginx-containers
          image: nginx:1.12.3
          ports:
          - containerPort: 80
        